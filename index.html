<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> repo Login</title>
    <!-- Link your CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- Load Fengari so Lua runs in the browser -->
    <script src="https://github.com/fengari-lua/fengari-web/releases/download/v0.1.4/fengari-web.js"></script>
</head>
<body>

    <div id="loginFormFrame">
    <h2>Sign In</h2>
    
    <input type="text" id="usernameField" placeholder="Enter Username">
    <input type="password" id="passwordField" placeholder="Enter Password">
    
    <button id="submitButton">Submit</button>

    <div class="form-links">
        <button id="registerButton">Create Account</button>
        <button id="forgotButton">Forgot Password?</button>
    </div>
</div>

    
    <!-- Load your Lua file -->
    <script type="application/lua" src="app.lua"></script>

</body>
</html>
